<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kin Marché | Liaison Compte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; padding-bottom: 100px; }
        .text-kin { color: #e60000; }
        .bg-kin { background-color: #e60000; }
        .input-group { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 15px; margin-bottom: 15px; display: flex; align-items: center; }
        .input-group input, .input-group select { border: none; outline: none; width: 100%; font-size: 14px; margin-left: 10px; background: transparent; }
        .input-group i { color: #cbd5e1; width: 20px; text-align: center; }
        .btn-lier { background-color: #e60000; color: white; width: 100%; padding: 14px; border-radius: 30px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn-lier:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* Navigation basse */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #999; text-decoration: none; }
        .nav-item.active { color: #e60000; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="flex items-center p-4 bg-white border-bottom border-gray-100">
        <a href="profil.html"><i class="fas fa-chevron-left text-gray-600"></i></a>
        <h1 class="flex-1 text-center font-bold text-lg">Compte</h1>
    </div>

    <div class="p-6">
        <div class="flex items-start gap-2 mb-1">
            <span class="text-2xl text-kin font-bold">+</span>
            <h2 class="text-xl font-bold text-[#001529]">Ajouter un compte bancaire</h2>
        </div>
        <p class="text-kin text-xs mb-6">Liez votre carte bancaire pour faciliter vos retraits</p>

        <!-- Formulaire -->
        <label class="text-xs font-bold text-gray-700 mb-2 block">Nom du titulaire</label>
        <div class="input-group">
            <input type="text" id="holder-name" placeholder="Veuillez saisir le nom complet du titulaire">
            <i class="far fa-user"></i>
        </div>

        <label class="text-xs font-bold text-gray-700 mb-2 block">Numéro de compte (Téléphone)</label>
        <div class="input-group">
            <input type="tel" id="account-number" placeholder="Ex: 0820000000">
            <i class="far fa-credit-card"></i>
        </div>

        <label class="text-xs font-bold text-gray-700 mb-2 block">Sélectionner une banque / réseau</label>
        <div class="input-group">
            <select id="bank-name">
                <option value="" disabled selected>Veuillez sélectionner votre banque</option>
                <option value="Orange Money">Orange Money</option>
                <option value="Airtel Money">Airtel Money</option>
                <option value="M-Pesa (Vodacom)">M-Pesa (Vodacom)</option>
            </select>
            <i class="fas fa-chevron-right"></i>
        </div>

        <p class="text-[11px] text-gray-400 mt-4 leading-relaxed">
            Veuillez vous assurer que les informations de votre compte de retrait sont exactes et complètes. Une fois lié, ce compte recevra vos fonds lors des retraits.
        </p>

        <button id="btn-submit" onclick="saveAccount()" class="btn-lier shadow-lg shadow-red-200">Lier mon compte</button>
    </div>

    <!-- Navigation Basse Corrigée avec le nom exact du fichier GitHub -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-sync-alt"></i><span>Commencer</span></a>
        <a href="investir.html" class="nav-item"><i class="fas fa-list-alt"></i><span>Investir</span></a>
        <a href="gains.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Gains</span></a>
        <a href="agent.html" class="nav-item"><i class="fas fa-paper-plane"></i><span>Agent</span></a>
        <a href="profil.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>Profil</span></a>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = localStorage.getItem('userId');

        async function saveAccount() {
            const name = document.getElementById('holder-name').value;
            const number = document.getElementById('account-number').value;
            const bank = document.getElementById('bank-name').value;
            const btn = document.getElementById('btn-submit');

            if(!userId) {
                alert("Erreur d'authentification. Veuillez vous reconnecter.");
                window.location.href = "index.html";
                return;
            }

            if(!name || !number || !bank) {
                alert("Veuillez remplir tous les champs avant de lier.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Liaison en cours...";

            const bankInfo = {
                titulaire: name,
                numero: number,
                banque: bank,
                dateLiaison: new Date().toISOString()
            };

            try {
                await db.ref('users/' + userId + '/bankInfo').set(bankInfo);
                localStorage.setItem('userBankInfo', JSON.stringify(bankInfo));
                alert("Votre compte a été lié avec succès à votre profil !");
                window.location.href = "retrait.html"; 
            } catch (error) {
                alert("Erreur lors de la liaison au serveur. Veuillez réessayer.");
                btn.disabled = false;
                btn.innerText = "Lier mon compte";
            }
        }

        window.onload = function() {
            if(userId) {
                db.ref('users/' + userId + '/bankInfo').once('value').then((snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        document.getElementById('holder-name').value = data.titulaire;
                        document.getElementById('account-number').value = data.numero;
                        document.getElementById('bank-name').value = data.banque;
                        document.getElementById('btn-submit').innerText = "Mettre à jour mon compte";
                    }
                });
            }
        };
    </script>
</body>
</html>
