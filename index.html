<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kin Marché | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 3px solid #10b981; color: #10b981; }
        .btn-approve { background-color: #10b981; color: white; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .btn-reject { background-color: #ef4444; color: white; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .btn-approve:hover { opacity: 0.8; }
        .btn-reject:hover { opacity: 0.8; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <div class="bg-[#001529] text-white p-4 shadow-lg flex justify-between items-center">
        <button onclick="window.location.href='dashboard.html'" class="text-white"><i class="fas fa-arrow-left"></i></button>
        <h1 class="text-xl font-bold">PANNEAU D'ADMINISTRATION</h1>
        <div class="w-6"></div> 
    </div>

    <!-- Navigation Tabs -->
    <div class="flex bg-white border-b sticky top-0 z-10">
        <button onclick="showTab('withdrawals', this)" class="flex-1 p-4 font-bold text-gray-600 active-tab" id="btn-w">RETRAITS</button>
        <button onclick="showTab('recharges', this)" class="flex-1 p-4 font-bold text-gray-600" id="btn-r">RECHARGES</button>
    </div>

    <div class="p-4 max-w-2xl mx-auto">
        <!-- Section Retraits -->
        <div id="withdrawals" class="tab-content active">
            <h2 class="text-lg font-bold mb-4 text-gray-700 flex items-center"><i class="fas fa-money-bill-wave mr-2 text-red-500"></i> Demandes de Retrait</h2>
            <div id="list-withdrawals" class="space-y-4">
                <p class="text-gray-400 text-sm italic">Chargement des demandes...</p>
            </div>
        </div>

        <!-- Section Recharges -->
        <div id="recharges" class="tab-content">
            <h2 class="text-lg font-bold mb-4 text-gray-700 flex items-center"><i class="fas fa-university mr-2 text-green-500"></i> Demandes de Recharge</h2>
            <div id="list-recharges" class="space-y-4">
                <p class="text-gray-400 text-sm italic">Chargement des demandes...</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = { databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // CHANGER D'ONGLET
        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.flex button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active-tab');
        }

        // CHARGER LES RETRAITS
        db.ref('withdraws').on('value', (snapshot) => {
            const container = document.getElementById('list-withdrawals');
            container.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                container.innerHTML = '<div class="bg-white p-6 rounded-xl text-center text-gray-400 shadow-sm">Aucun retrait en attente.</div>';
                return;
            }

            for (let id in data) {
                const req = data[id];
                const card = `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500 animate-fadeIn">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="font-black text-xl text-gray-800">${req.amount} FC</p>
                                <p class="text-xs text-blue-600 font-bold">ID Client: ${req.userId}</p>
                            </div>
                            <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-500">${req.date || 'Aujourd\'hui'}</span>
                        </div>
                        <div class="bg-gray-50 p-2 rounded-lg text-sm text-gray-600 mb-3">
                            <p><i class="fas fa-check-circle mr-1 text-red-400"></i> <strong>Méthode:</strong> ${req.bank || 'M-Pesa / Orange'}</p>
                            <p><i class="fas fa-phone mr-1 text-red-400"></i> <strong>Numéro:</strong> ${req.number || 'N/A'}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="handleWithdraw('${id}', '${req.userId}', ${req.amount}, 'approve')" class="btn-approve flex-1">VALIDER</button>
                            <button onclick="handleWithdraw('${id}', '${req.userId}', ${req.amount}, 'reject')" class="btn-reject flex-1">REJETER</button>
                        </div>
                    </div>`;
                container.innerHTML += card;
            }
        });

        // CHARGER LES RECHARGES
        db.ref('recharges').on('value', (snapshot) => {
            const container = document.getElementById('list-recharges');
            container.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                container.innerHTML = '<div class="bg-white p-6 rounded-xl text-center text-gray-400 shadow-sm">Aucune recharge en attente.</div>';
                return;
            }

            for (let id in data) {
                const req = data[id];
                const card = `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500 animate-fadeIn">
                        <div class="mb-2">
                            <p class="font-black text-xl text-gray-800">${req.amount} FC</p>
                            <p class="text-xs text-blue-600 font-bold">Utilisateur: ${req.userId}</p>
                        </div>
                        <div class="bg-gray-50 p-2 rounded-lg text-sm text-gray-600 mb-3">
                           <p class="italic"><strong>ID Transaction:</strong> ${req.transactionId || 'Non fourni'}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="handleRecharge('${id}', '${req.userId}', ${req.amount}, 'approve')" class="btn-approve flex-1">APPROUVER</button>
                            <button onclick="handleRecharge('${id}', '${req.userId}', ${req.amount}, 'reject')" class="btn-reject flex-1">REJETER</button>
                        </div>
                    </div>`;
                container.innerHTML += card;
            }
        });

        // TRAITEMENT RETRAIT
        async function handleWithdraw(requestId, userId, amount, action) {
            if (confirm("Confirmer cette action pour le retrait ?")) {
                if (action === 'approve') {
                    alert("Retrait Validé avec succès !");
                } else {
                    const userRef = db.ref('users/' + userId + '/balance');
                    const snap = await userRef.once('value');
                    const currentBalance = parseFloat(snap.val() || 0);
                    await userRef.set(currentBalance + parseFloat(amount));
                    alert("Retrait Rejeté. L'utilisateur a été remboursé.");
                }
                db.ref('withdraws/' + requestId).remove();
            }
        }

        // TRAITEMENT RECHARGE
        async function handleRecharge(requestId, userId, amount, action) {
            if (confirm("Confirmer cette action pour la recharge ?")) {
                if (action === 'approve') {
                    const userRef = db.ref('users/' + userId + '/balance');
                    const snap = await userRef.once('value');
                    const currentBalance = parseFloat(snap.val() || 0);
                    await userRef.set(currentBalance + parseFloat(amount));
                    alert("Compte crédité avec succès !");
                } else {
                    alert("Recharge rejetée.");
                }
                db.ref('recharges/' + requestId).remove();
            }
        }
    </script>
</body>
</html>
